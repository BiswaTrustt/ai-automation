spring:
  application:
    name: api-automation-framework

  datasource:
    url: jdbc:postgresql://localhost:5432/api_automation_db
    username: postgres
    password: root
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          lob:
            non_contextual_creation: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

server:
  port: 8080

logging:
  level:
    root: INFO
    com.example.apiframework: DEBUG
    org.hibernate.SQL: WARN
  file:
    name: logs/api-framework.log

api:
  framework:
    default-timeout: 30000
    max-retry: 3
    environments:
      qa: https://qa2-mfi.novopay.in
      staging: https://staging-mfi.novopay.in
      prod: https://prod-mfi.novopay.in
